<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFT Marketplace · Base</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>🖼️ NFT Marketplace</h1>
        <p class="subtitle">List and buy ERC-721 NFTs on Base.</p>
        <button id="connectBtn" class="btn">Connect Wallet</button>
        <p id="account" class="account hidden"></p>
      </header>

      <section id="listCard" class="list-card hidden">
        <h2>List an NFT</h2>
        <input id="nftInput" type="text" placeholder="NFT contract address (0x…)" />
        <div class="row2">
          <input id="tokenIdInput" type="number" min="0" placeholder="Token ID" />
          <input id="priceInput" type="number" min="0" step="0.001" placeholder="Price (ETH)" />
        </div>
        <button id="approveBtn" class="btn btn-ghost">1. Approve</button>
        <button id="listBtn" class="btn">2. List for sale</button>
        <p class="hint muted">Approve the marketplace for your token, then list it.</p>
      </section>

      <p id="status" class="status"></p>

      <section class="listings-section">
        <div class="list-head">
          <h2>Listings <span id="count" class="counts"></span></h2>
          <button id="refreshBtn" class="btn btn-ghost" disabled>Refresh</button>
        </div>
        <div id="filters" class="filters hidden">
          <button class="filter active" data-filter="all">All</button>
          <button class="filter" data-filter="mine">My listings</button>
        </div>
        <div id="listings" class="listings"></div>
        <p id="empty" class="empty">No active listings — list the first one!</p>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
